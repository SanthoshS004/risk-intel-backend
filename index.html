<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Intelligence | Scam Detection Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <div class="app-container">
        <aside class="sidebar glass-panel">
            <div class="brand">
                <i class="fa-solid fa-shield-halved brand-icon"></i>
                <h1>RiskIntel</h1>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="#" class="nav-item"><i class="fa-solid fa-message"></i> Scan Message</a>
                <a href="#" class="nav-item"><i class="fa-solid fa-link"></i> Scan URL</a>
                <a href="#" class="nav-item"><i class="fa-solid fa-database"></i> Intel DB</a>
                <a href="#" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
            </nav>
            <div class="system-status">
                <div class="status-indicator online"></div>
                <span>System Online</span>
                <p>AI Engine Active</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar glass-panel">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Search logs, indicators, or URLs...">
                </div>
                <div class="user-profile">
                    <div class="notification-bell">
                        <i class="fa-regular fa-bell"></i>
                        <span class="badge">3</span>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=Admin+User&background=6366f1&color=fff" alt="Admin" class="avatar">
                </div>
            </header>

            <div class="dashboard-grid">
                <div class="stat-cards">
                    <div class="stat-card glass-panel">
                        <div class="stat-icon threat"><i class="fa-solid fa-skull-crossbones"></i></div>
                        <div class="stat-info">
                            <h3>High Risk Detected</h3>
                            <p id="stat-high-risk">24</p>
                        </div>
                    </div>
                    <div class="stat-card glass-panel">
                        <div class="stat-icon warning"><i class="fa-solid fa-triangle-exclamation"></i></div>
                        <div class="stat-info">
                            <h3>Medium Risk</h3>
                            <p id="stat-med-risk">12</p>
                        </div>
                    </div>
                    <div class="stat-card glass-panel">
                        <div class="stat-icon safe"><i class="fa-solid fa-shield-check"></i></div>
                        <div class="stat-info">
                            <h3>Safe Scans</h3>
                            <p id="stat-safe">1,240</p>
                        </div>
                    </div>
                </div>

                <div class="scanner-section glass-panel">
                    <h2><i class="fa-solid fa-radar"></i> Live Threat Scanner</h2>
                    <div class="tabs">
                        <button class="tab-btn active" data-target="message-scan">Message / SMS</button>
                        <button class="tab-btn" data-target="url-scan">URL Analysis</button>
                    </div>

                    <div class="scan-container active" id="message-scan">
                        <textarea id="message-input" placeholder="Paste suspicious message, SMS, or email content here to scan..."></textarea>
                        <div class="scan-actions">
                            <select id="channel-select" class="styled-select">
                                <option value="sms">SMS</option>
                                <option value="whatsapp">WhatsApp</option>
                                <option value="email">Email</option>
                                <option value="telegram">Telegram</option>
                            </select>
                            <button id="scan-message-btn" class="primary-btn"><i class="fa-solid fa-microchip"></i> Analyze Threat</button>
                        </div>
                    </div>

                    <div class="scan-container" id="url-scan" style="display: none;">
                        <input type="text" id="url-input" placeholder="https://suspicious-link.com/login" class="styled-input">
                        <div class="scan-actions" style="margin-top: 15px; justify-content: flex-end;">
                            <button id="scan-url-btn" class="primary-btn"><i class="fa-solid fa-magnifying-glass-arrow-right"></i> Analyze URL</button>
                        </div>
                    </div>
                    
                    <div id="scan-loader" class="loader-container" style="display: none;">
                        <div class="spinner"></div>
                        <p>AI Engine analyzing patterns...</p>
                    </div>

                    <div id="scan-result" class="result-card" style="display: none;">
                        <div class="risk-gauge" id="risk-gauge">
                            <div class="gauge-ring">
                                <span id="risk-score">0</span>
                            </div>
                            <span id="risk-level-text">Safe</span>
                        </div>
                        <div class="explanations">
                            <h3>Detection Reasons:</h3>
                            <ul id="explanation-list"></ul>
                        </div>
                    </div>
                </div>

                <div class="live-feed glass-panel">
                    <h2><i class="fa-solid fa-list-ul"></i> Recent Detections</h2>
                    <div class="feed-list" id="recent-feed">
                        <!-- Feed items will be populated by JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
